<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8" />
    <title>Palindrome Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="stack">
    <main class="stack">
      <h1>
        <button
          aria-expanded="false"
          aria-controls="palindrome-tip"
          id="palindrome-tip-btn"
        >
          Palindrome
        </button>
        Checker
      </h1>
      <div class="stack app-div">
        <label for="text-input" class="sr-only"
          >Enter a word and check to see if it's a palindrome</label
        >
        <div class="input-div">
          <input type="text" id="text-input" />
          <button id="check-btn">Check</button>
        </div>
        <p id="result" role="status" aria-live="polite"></p>
      </div>
    </main>
    <p id="palindrome-tip" hidden>
      A <em>palindrome</em> is a word or sentence that's spelled the same way
      both forward and backward, ignoring punctuation, case, and spacing.
    </p>
    <script src="script.js"></script>
  </body>
</html>

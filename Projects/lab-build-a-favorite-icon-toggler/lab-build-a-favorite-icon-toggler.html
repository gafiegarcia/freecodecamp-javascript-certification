<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Favorite Icon Toggler</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main>
      <h1>Browser Daily Driver</h1>
      <ul class="item-list">
        <li>
          <span>
            <img src="https://raw.githubusercontent.com/zen-browser/branding-archive/fad9cfe9346a5bfe6c181f94014143978c9c233b/Official/Word%20Marks/SVG/zen_logo_icon_color.svg" alt="zen browser logo" class="logo">
            Zen
          </span>
          <button class="favorite-icon">&#9825;</button>
        </li>
        <li>
          <span>
            <img src="https://cdn.worldvectorlogo.com/logos/safari-3.svg" alt="safari logo" class="logo">
            Safari
          </span>
          <button class="favorite-icon">&#9825;</button>
        </li>
        <li>
          <span>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/Google_Chrome_icon_%28February_2022%29.svg/1280px-Google_Chrome_icon_%28February_2022%29.svg.png" alt="chrome logo" class="logo">
            Chrome
          </span>
          <button class="favorite-icon">&#9825;</button>
        </li>
      </ul>
    </main>
    <script src="script.js"></script>
  </body>
</html>

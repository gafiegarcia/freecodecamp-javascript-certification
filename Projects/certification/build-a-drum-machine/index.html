<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drum Machine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&family=Wix+Madefor+Display:wght@400..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main>
      <div id="drum-machine">
        <h1>Drum Machine</h1>
        <div id="pad-bank" class="bordered-area">
          <button class="drum-pad">
            <audio src="" class="clip" id="Q"></audio>
            <span>Q</span>
          </button>
          <button class="drum-pad">
            <audio src="" class="clip" id="W"></audio>
            <span>W</span>
          </button>
          <button class="drum-pad">
            <audio src="" class="clip" id="E"></audio>
            <span>E</span>
          </button>
          <button class="drum-pad">
            <audio src="" class="clip" id="A"></audio>
            <span>A</span>
          </button>
          <button class="drum-pad">
            <audio src="" class="clip" id="S"></audio>
            <span>S</span>
          </button>
          <button class="drum-pad">
            <audio src="" class="clip" id="D"></audio>
            <span>D</span>
          </button>
          <button class="drum-pad">
            <audio src="" class="clip" id="Z"></audio>
            <span>Z</span>
          </button>
          <button class="drum-pad">
            <audio src="" class="clip" id="X"></audio>
            <span>X</span>
          </button>
          <button class="drum-pad">
            <audio src="" class="clip" id="C"></audio>
            <span>C</span>
          </button>
        </div>
        <p id="display"></p>
        <div id="settings" class="stack bordered-area">
          <h2 class="sr-only">Settings</h2>
          <div id="volume-container" class="stack">
            <h3>VOLUME</h3>
            <div class="flex">
              <div class="slider-db flex" aria-hidden="true">
                <div class="left stack">
                  <div class="db-0">
                    <span class="xbold">0</span>
                  </div>
                  <div class="filler"></div>
                  <div class="filler"></div>
                  <div class="db-3">
                    <span>– 3</span>
                  </div>
                  <div class="filler"></div>
                  <div class="filler"></div>
                  <div class="db-6">
                    <span>– 6</span>
                  </div>
                  <div class="filler"></div>
                  <div class="filler"></div>
                  <div class="db-12">
                    <span>– 12</span>
                  </div>
                  <div class="filler"></div>
                  <div class="filler"></div>
                  <div class="db-inf">
                    <span>– ∞</span>
                  </div>
                </div>
                <div class="right stack">
                  <div class="db-0"></div>
                  <div class="filler"></div>
                  <div class="filler"></div>
                  <div class="db-3"></div>
                  <div class="filler"></div>
                  <div class="filler"></div>
                  <div class="db-6"></div>
                  <div class="filler"></div>
                  <div class="filler"></div>
                  <div class="db-12"></div>
                  <div class="filler"></div>
                  <div class="filler"></div>
                  <div class="db-inf"></div>
                </div>
              </div>
              <input type="range" id="volume" min="0" max="1" step="0.01" />
            </div>
          </div>
          <div class="stack" id="demo-container">
            <h3>DEMO</h3>
            <div class="flex">
              <button class="demo-btn" id="demo-play-btn">
                <svg
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                  height="24px"
                  viewBox="0 -960 960 960"
                  width="24px"
                  fill="currentColor"
                >
                  <path
                    d="M320-273v-414q0-17 12-28.5t28-11.5q5 0 10.5 1.5T381-721l326 207q9 6 13.5 15t4.5 19q0 10-4.5 19T707-446L381-239q-5 3-10.5 4.5T360-233q-16 0-28-11.5T320-273Zm80-207Zm0 134 210-134-210-134v268Z"
                  />
                </svg>
                <span class="sr-only">Play</span>
              </button>
              <button class="demo-btn" id="demo-stop-btn">
                <svg
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                  height="24px"
                  viewBox="0 -960 960 960"
                  width="24px"
                  fill="currentColor"
                >
                  <path
                    d="M240-320v-320q0-33 23.5-56.5T320-720h320q33 0 56.5 23.5T720-640v320q0 33-23.5 56.5T640-240H320q-33 0-56.5-23.5T240-320Zm80 0h320v-320H320v320Zm160-160Z"
                  />
                </svg>
                <span class="sr-only">Stop</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
